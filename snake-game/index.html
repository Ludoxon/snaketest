<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>Snake</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="home" class="screen">
      <div class="title-area">
        <div class="snake-logo">&#9654;&#9654;&#9654;&#9679;</div>
        <h1>SNAKE</h1>
        <p class="subtitle">Meta Display Glasses</p>
      </div>
      <div class="menu-stats">
        <div class="stat-box">
          <span class="stat-label">High Score</span>
          <span class="stat-value" id="home-high-score">0</span>
        </div>
      </div>
      <nav class="menu-nav">
        <button class="menu-btn focusable primary" data-action="start-game">Start Game</button>
        <button class="menu-btn focusable" data-action="show-controls">Controls</button>
      </nav>
    </div>

    <div id="controls" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>Controls</h1>
      </header>
      <div class="content">
        <div class="control-row">
          <span class="control-key">&#9650;</span>
          <span class="control-desc">Move Up</span>
        </div>
        <div class="control-row">
          <span class="control-key">&#9660;</span>
          <span class="control-desc">Move Down</span>
        </div>
        <div class="control-row">
          <span class="control-key">&#9664;</span>
          <span class="control-desc">Move Left</span>
        </div>
        <div class="control-row">
          <span class="control-key">&#9654;</span>
          <span class="control-desc">Move Right</span>
        </div>
        <div class="control-row">
          <span class="control-key">TAP</span>
          <span class="control-desc">Pause / Resume</span>
        </div>
      </div>
    </div>

    <div id="game" class="screen hidden">
      <div class="game-hud">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score-display">0</span>
        <span class="hud-spacer"></span>
        <span class="hud-label">BEST</span>
        <span class="hud-value" id="best-display">0</span>
      </div>
      <canvas id="game-canvas" width="560" height="520"></canvas>
      <div id="pause-overlay" class="overlay hidden">
        <div class="overlay-text">PAUSED</div>
        <div class="overlay-hint">Tap to resume</div>
      </div>
    </div>

    <div id="gameover" class="screen hidden">
      <div class="gameover-area">
        <h1 class="gameover-title">GAME OVER</h1>
        <div class="gameover-scores">
          <div class="final-score">
            <span class="final-label">Score</span>
            <span class="final-value" id="final-score">0</span>
          </div>
          <div class="final-score">
            <span class="final-label">Best</span>
            <span class="final-value best" id="final-best">0</span>
          </div>
        </div>
        <div id="new-high-badge" class="new-high hidden">NEW HIGH SCORE!</div>
      </div>
      <nav class="menu-nav">
        <button class="menu-btn focusable primary" data-action="start-game">Play Again</button>
        <button class="menu-btn focusable" data-action="go-home">Main Menu</button>
      </nav>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
